<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      color: #1f2933;
    }

    .wrap {
      max-width: 560px;
      margin: 24px auto;
      padding: 16px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d9dee5;
      border-radius: 8px;
      padding: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      border: 1px solid #b9c2cc;
      background: #f9fafb;
      color: #1f2933;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:active {
      background: #eef2f6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(20, 1fr);
      gap: 1px;
      background: #d9dee5;
      border: 1px solid #d9dee5;
      width: min(92vw, 480px);
      height: min(92vw, 480px);
      margin: 0 auto;
    }

    .cell {
      background: #f8fafc;
    }

    .snake {
      background: #1f4e79;
    }

    .snake-head {
      background: #163954;
    }

    .food {
      background: #b62828;
    }

    .controls {
      margin-top: 12px;
      display: grid;
      justify-content: center;
      gap: 6px;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .controls button {
      width: 44px;
      height: 40px;
      padding: 0;
      font-size: 16px;
      line-height: 1;
    }

    .help {
      margin-top: 10px;
      font-size: 13px;
      color: #52606d;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="wrap" data-snake-root>
    <section class="panel">
      <div class="row">
        <strong>Classic Snake</strong>
        <div>Score: <span data-score>0</span></div>
      </div>
      <div class="row">
        <div>Status: <span data-status>Playing</span></div>
        <div class="actions">
          <button type="button" data-pause>Pause</button>
          <button type="button" data-restart>Restart</button>
        </div>
      </div>
      <div class="grid" data-grid role="img" aria-label="Snake game board"></div>
      <div class="controls" aria-label="On-screen controls">
        <div class="controls-row">
          <button type="button" data-control="up" aria-label="Move up">&#8593;</button>
        </div>
        <div class="controls-row">
          <button type="button" data-control="left" aria-label="Move left">&#8592;</button>
          <button type="button" data-control="down" aria-label="Move down">&#8595;</button>
          <button type="button" data-control="right" aria-label="Move right">&#8594;</button>
        </div>
      </div>
      <p class="help">Keyboard: Arrow keys or WASD. Pause: P/Space. Restart: R.</p>
    </section>
  </main>
  <script src="./snake-game.js"></script>
</body>
</html>
