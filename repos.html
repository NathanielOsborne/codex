<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nathaniel Osborne | Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <div id="particleLayer" class="particle-layer" aria-hidden="true"></div>

  <header class="topbar reveal">
    <a class="brand" href="./index.html">Mood Lab</a>
    <nav class="topnav topnav-tabs">
      <a class="tab-link" href="./index.html">Home</a>
      <a class="tab-link active" href="./repos.html">Projects</a>
      <a class="tab-link" href="./vibe.html">Vibe Play</a>
    </nav>
    <div class="topbar-actions">
      <button id="themeToggleBtn" class="btn ghost" type="button">Dark Mode: Off</button>
      <a class="btn primary" href="https://github.com/NathanielOsborne" target="_blank" rel="noreferrer">Connect</a>
    </div>
  </header>

  <main>
    <section class="hero reveal">
      <p class="eyebrow">Projects</p>
      <h1>Live repository list.</h1>
      <p class="lead">Search fast. Filter fast.</p>
      <div class="cta-row">
        <a class="btn primary" href="./index.html">Home</a>
        <a class="btn ghost" href="https://github.com/NathanielOsborne?tab=repositories" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </section>

    <section id="repos" class="repos reveal">
      <div class="section-head">
        <h2>Repositories</h2>
        <p>Live</p>
      </div>
      <div class="filters" role="group" aria-label="Repository filters">
        <input id="repoSearch" type="search" placeholder="Search repos..." aria-label="Search repositories" />
        <select id="languageFilter" aria-label="Filter by language">
          <option value="all">All languages</option>
        </select>
      </div>
      <div id="repoGrid" class="repo-grid" aria-live="polite"></div>
      <p id="status" class="status">Loading repositories...</p>
    </section>

    <section class="contact reveal" id="contact">
      <div class="section-head">
        <h2>Need a site like this?</h2>
      </div>
      <p>Let’s build it.</p>
      <div class="cta-row">
        <a class="btn primary" href="./index.html">Mood Lab</a>
        <a class="btn ghost" href="https://github.com/NathanielOsborne" target="_blank" rel="noreferrer">Message</a>
      </div>
    </section>
  </main>

  <footer>
    <small><span id="year"></span></small>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
